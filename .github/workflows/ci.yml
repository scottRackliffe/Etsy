name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Environment check
        run: npm run env:check
        env:
          ETSY_CLIENT_ID: ci-placeholder
          ETSY_CLIENT_SECRET: ci-placeholder
          ETSY_REDIRECT_URI: http://localhost:3000/api/auth/etsy/callback

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Migrate database
        run: npm run db:migrate
        env:
          SQLITE_PATH: data/ci.sqlite

      - name: Seed database
        run: npm run db:seed
        env:
          SQLITE_PATH: data/ci.sqlite

      - name: Unit and integration tests
        run: npm run test
